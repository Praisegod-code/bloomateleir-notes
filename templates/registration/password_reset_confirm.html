{% extends "base.html" %}
{% block content %}
<div class="container">
    <div class="form-card">
        {% if validlink %}
            <h1>Set a new password</h1>
            <form method="POST">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="add-btn">Reset password</button>
            </form>
        {% else %}
            <h1>Link invalid</h1>
            <p>This password reset link is invalid, possibly because it has already been used. Request a new one.</p>
        {% endif %}
    </div>
</div>
{% endblock %}
