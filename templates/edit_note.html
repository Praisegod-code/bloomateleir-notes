{% extends "base.html" %}
{%block content %}

    <div class="container">
        <div class="form-card">
            <h1>Edit Note</h1>

            <form method="POST">
                {% csrf_token %}
                <label for="title">Title</label>
                <input
                    type="text"
                    id="title"
                    name="title"
                    value="{{ note.title }}"
                    required>
                <label for="content">Content</label>

                <textarea
                    id="content"
                    name="content"
                    rows="8"
                    required>{{ note.content }}
                </textarea>

                <div class="checkbox-group">
                    <input
                        type="checkbox"
                        id="completed"
                        name="completed"

                        {% if note.completed %}
                            checked
                        {% endif %}>



                </div>
                <label for="color">Color</label><br>
                    <select name="color" id="color">
                        <option value="default" {% if note.color == "default" %}selected{% endif %}>Default</option>
                        <option value="yellow" {% if note.color == "yellow" %}selected{% endif %}>Yellow</option>
                        <option value="pink" {% if note.color == "pink" %}selected{% endif %}>Pink</option>
                        <option value="blue" {% if note.color == "blue" %}selected{% endif %}>Blue</option>
                        <option value="green" {% if note.color == "green" %}selected{% endif %}>Green</option>
                    </select>

                <button type="submit" class="save-btn">
                     Update Note
                </button>

                <a href="{% url 'note_detail' note.id %}" class="cancel-btn">
                    Cancel
                </a>
            </form>
        </div>
    </div>

</body>
{% endblock %}
