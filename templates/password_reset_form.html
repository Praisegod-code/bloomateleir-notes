{% extends "base.html" %}
{% block content %}
<div class="container">
    <div class="form-card">
        <h1>Reset your password</h1>
        <p>Enter your email and we'll send you a link to reset it.</p>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="add-btn">Send reset link</button>
        </form>
    </div>
</div>
{% endblock %}
