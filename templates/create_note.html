{% extends "base.html" %}
{% block content %}
<div class="container">
    <h1>Create New Note</h1>
    <p>Capture your thoughts before they disappear.</p>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <label for="title">Title</label>
        <input type="text" id="title" name="title" placeholder="Enter note title" required>

        <label for="content">Content</label>
        <textarea id="content" name="content" rows="8" placeholder="Write your thoughts here..." required></textarea>

        <label for="attachment">Attachment</label>
        <input type="file" id="attachment" name="attachment">


        <div class="form-actions">
            <button type="submit" class="add-btn">Save Note</button>
            <a href="{% url 'homepage' %}" class="cancel-btn">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
